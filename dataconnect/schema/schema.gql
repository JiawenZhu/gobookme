# ─── Feature
type Feature @table(name: "Feature", key: ["slug"]) {
  slug: String! @col(name: "slug")
  enabled: Boolean! @col(name: "enabled")
  description: String @col(name: "description")
  type: String @col(name: "type")
  stale: Boolean @col(name: "stale")
  lastUsedAt: Timestamp @col(name: "lastUsedAt")
  createdAt: Timestamp @col(name: "createdAt")
  updatedAt: Timestamp @col(name: "updatedAt")
  updatedBy: Int @col(name: "updatedBy")
}
